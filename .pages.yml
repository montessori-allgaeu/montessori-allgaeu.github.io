media:
  - name: team-images
    label: Teamfotos (über „Team“ auswählen)
    input: src/assets/images/team
    output: ../../assets/images/team
    extensions: [jpg, jpeg, png, webp]
    rename: safe
  - name: documents
    label: PDF-Dateien (über „Downloads“ auswählen)
    input: public/downloads
    output: /downloads
    extensions: [pdf]
    rename: safe

content:
  - name: events
    label: Termine
    type: collection
    path: src/content/events
    format: yaml
    filename:
      template: "{date}-{title}.yml"
      field: false
    view:
      fields: [title, date, category, status]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: asc
    operations:
      rename: false
    fields:
      - name: title
        label: Titel
        type: string
        required: true
      - name: category
        label: Kategorie
        type: select
        required: true
        options:
          placeholder: Kategorie auswählen
          values:
            - Kennenlernen
            - Informationsabend
            - Monte-Gemeinschaft & Freunde
            - Ferien & Schließtage
            - Sonstiges
      - name: date
        label: Datum
        type: date
        required: true
        default: ""
        options:
          format: yyyy-MM-dd
      - name: time
        label: Uhrzeit
        type: string
        required: true
        description: Freier Text, zum Beispiel „19:00 Uhr“ oder „Uhrzeit über die interne Einladung“.
      - name: location
        label: Ort
        type: string
        required: true
      - name: description
        label: Beschreibung
        type: text
        required: true
      - name: status
        label: Status
        type: select
        required: true
        default: draft
        description: Neue Termine bleiben zunächst unsichtbar. Erst nach der Prüfung veröffentlichen.
        options:
          values:
            - name: draft
              label: Entwurf – nicht auf Website
            - name: published
              label: Veröffentlicht – auf Website

  - name: jobs
    label: Stellenangebote
    type: collection
    path: src/content/jobs
    format: yaml
    filename:
      template: "{title}.yml"
      field: false
    view:
      fields: [title, area, scope, status, position]
      primary: title
      sort: [position, title]
      default:
        sort: position
        order: asc
      search: [title, area, team, scope, start]
    operations:
      rename: false
    fields:
      - name: title
        label: Stellenbezeichnung
        type: string
        required: true
      - name: area
        label: Bereich
        type: select
        required: true
        options:
          placeholder: Bereich auswählen
          values:
            - Kindergarten
            - Schule
            - Kindergarten oder Schule
      - name: team
        label: Team, Lerngruppe oder Klassenstufen
        type: string
        description: Optional, zum Beispiel „Klasse 5–7“.
      - name: scope
        label: Beschäftigungsumfang
        type: string
        required: true
        description: Zum Beispiel „Vollzeit oder Teilzeit“, „Teilzeit“ oder „Umfang nach Vereinbarung“.
      - name: start
        label: Start
        type: string
        description: Optional, zum Beispiel „September 2026“ oder „Nach Vereinbarung“.
      - name: intro
        label: Einleitung
        type: text
        required: true
      - name: about
        label: Über uns
        type: text
        required: true
        list:
          min: 1
      - name: responsibilities
        label: Aufgaben
        type: string
        required: true
        list:
          min: 1
      - name: profile
        label: Profil
        type: string
        required: true
        list:
          min: 1
      - name: benefits
        label: Das erwartet dich bei uns
        type: string
        required: true
        list:
          min: 1
      - name: closingTitle
        label: Überschrift Bewerbung
        type: string
        required: true
      - name: closingText
        label: Einladung zur Bewerbung
        type: text
        required: true
      - name: position
        label: Position in der Stellenliste
        type: number
        required: true
        default: 50
        description: 10 steht weiter oben als 20. Bei gleicher Position wird alphabetisch sortiert.
        options:
          min: 1
      - name: status
        label: Status
        type: select
        required: true
        default: draft
        description: Neue Stellen bleiben zunächst unsichtbar. Erst nach der Prüfung veröffentlichen.
        options:
          values:
            - name: draft
              label: Entwurf – nicht auf Website
            - name: published
              label: Veröffentlicht – auf Website

  - name: team
    label: Team
    type: collection
    path: src/content/team
    format: yaml
    filename:
      template: "{name}.yml"
      field: false
    view:
      fields: [name, status]
      primary: name
      sort: [name]
      default:
        sort: name
        order: asc
      search: [name]
    operations:
      rename: false
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: assignments
        label: Rollen und Bereiche
        type: object
        required: true
        description: Für jede Darstellung auf der Teamseite einen Eintrag anlegen. Leitungen können so zusätzlich in ihrem pädagogischen Bereich erscheinen.
        list:
          min: 1
          collapsible:
            collapsed: true
            summary: "{group}: {role}"
        fields:
          - name: group
            label: Bereich
            type: select
            required: true
            options:
              values:
                - Leitung
                - Kindergarten
                - Primaria
                - Sekundaria
                - Tertia
                - Fach- & Förderteam
                - Verwaltung
                - Vorstand
          - name: section
            label: Untergruppe
            type: select
            description: Für Primaria und Sekundaria verpflichtend auswählen; bei allen anderen Bereichen leer lassen.
            options:
              values:
                - Klassenleitungen
                - Pädagogische Assistenzen
          - name: role
            label: Rolle
            type: string
            description: Optional, wenn die Untergruppe die Rolle bereits eindeutig macht.
          - name: position
            label: Position innerhalb des Bereichs
            type: number
            required: true
            default: 50
            description: 10 steht weiter oben als 20. Bei gleicher Position wird alphabetisch sortiert.
            options:
              min: 1
      - name: image
        label: Porträt
        type: image
        options:
          media: team-images
          extensions: [jpg, jpeg, png, webp]
          rename: safe
      - name: status
        label: Status
        type: select
        required: true
        default: draft
        description: Neue Teammitglieder bleiben zunächst unsichtbar. Erst nach der Prüfung veröffentlichen.
        options:
          values:
            - name: draft
              label: Entwurf – nicht auf Website
            - name: published
              label: Veröffentlicht – auf Website

  - name: downloads
    label: Downloads
    type: collection
    path: src/content/downloads
    format: yaml
    filename:
      template: "{title}.yml"
      field: false
    view:
      fields: [title, group, documentDate, status, position]
      primary: title
      sort: [group, position, title]
      default:
        sort: group
        order: asc
      search: [title, group, documentDate, note]
    operations:
      rename: false
    fields:
      - name: title
        label: Titel
        type: string
        required: true
      - name: documentDate
        label: Stand des Dokuments
        type: string
        description: Optional, zum Beispiel „März 2026“. „Stand“, Dateityp und Dateigröße ergänzt die Website automatisch.
      - name: note
        label: Zusätzlicher kurzer Hinweis
        type: string
        description: Optional, zum Beispiel „inkl. Datenschutzhinweisen“.
      - name: file
        label: PDF-Datei
        type: file
        required: true
        options:
          media: documents
          extensions: [pdf]
          rename: safe
      - name: group
        label: Bereich
        type: select
        required: true
        options:
          values:
            - Schule
            - Kindergarten
            - Aufnahme & Verein
      - name: position
        label: Position innerhalb des Bereichs
        type: number
        required: true
        default: 50
        description: 10 steht weiter oben als 20. Bei gleicher Position wird alphabetisch sortiert.
        options:
          min: 1
      - name: status
        label: Status
        type: select
        required: true
        default: draft
        description: Neue Downloads bleiben zunächst unsichtbar. Erst nach der Prüfung veröffentlichen.
        options:
          values:
            - name: draft
              label: Entwurf – nicht auf Website
            - name: published
              label: Veröffentlicht – auf Website

  - name: donations-page
