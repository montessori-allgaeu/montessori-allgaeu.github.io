            type: string
            required: true
          - name: title
            label: Überschrift
            type: string
            required: true
          - name: text
            label: Text
            type: text
            required: true
          - name: label
            label: Linktext
            type: string
            required: true
      - name: hero
        label: Seiteneinstieg
        type: object
        required: true
        fields:
          - name: eyebrow
            label: Kleine Überschrift
            type: string
            required: true
          - name: title
            label: Hauptüberschrift
            type: string
            required: true
          - name: intro
            label: Einleitung
            type: text
            required: true
      - name: impact
        label: Warum Unterstützung wirkt
