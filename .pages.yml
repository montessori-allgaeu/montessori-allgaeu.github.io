            label: Schwerpunkte
            type: object
            required: true
            list:
              min: 1
              max: 4
              collapsible:
                collapsed: true
                summary: "{title}"
            fields:
              - name: title
                label: Titel
                type: string
                required: true
              - name: description
                label: Beschreibung
                type: text
                required: true
      - name: directDonation
        label: Direkte Spende
        type: object
        required: true
        fields:
          - name: eyebrow
            label: Kleine Überschrift
            type: string
            required: true
          - name: title
            label: Überschrift
            type: string
            required: true
          - name: intro
            label: Einleitung
            type: text
            required: true
          - name: account
            label: Spendenkonto
            type: object
            required: true
            fields:
              - name: recipient
                label: Empfänger
                type: string
                required: true
              - name: bank
                label: Bank
                type: string
                required: true
              - name: iban
                label: IBAN
                type: string
                required: true
              - name: bic
                label: BIC
                type: string
                required: true
              - name: purpose
                label: Verwendungszweck
                type: string
                required: true
          - name: note
            label: Hinweis
            type: text
            required: true
      - name: company
        label: Firmen und Förderpartner
        type: object
