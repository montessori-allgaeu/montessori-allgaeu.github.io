        fields:
          - name: eyebrow
            label: Kleine Überschrift
            type: string
            required: true
          - name: title
            label: Überschrift
            type: string
            required: true
          - name: text
            label: Einleitung
            type: text
            required: true
          - name: detail
            label: Erläuterung
            type: text
            required: true
          - name: buttonLabel
            label: Text des E-Mail-Links
            type: string
            required: true
          - name: emailSubject
            label: Betreff der E-Mail
            type: string
            required: true
      - name: receipt
        label: Spendenbescheinigung
        type: object
        required: true
        fields:
          - name: eyebrow
            label: Kleine Überschrift
            type: string
            required: true
          - name: title
            label: Überschrift
            type: string
            required: true
          - name: intro
            label: Einleitung
            type: text
            required: true
          - name: instruction
            label: Ablauf
            type: text
            required: true
          - name: buttonLabel
            label: Text des E-Mail-Links
            type: string
            required: true
          - name: emailSubject
            label: Betreff der E-Mail
            type: string
            required: true
      - name: otherSupport
        label: Andere Unterstützung
        type: object
        required: true
        fields:
          - name: eyebrow
            label: Kleine Überschrift
            type: string
            required: true
          - name: title
            label: Überschrift
            type: string
            required: true
          - name: text
            label: Text
            type: text
            required: true
          - name: primaryLabel
            label: Linktext Mitgliedschaft
            type: string
            required: true
          - name: secondaryLabel
            label: Linktext Kontakt
            type: string
            required: true

  - name: master-data
    label: Stammdaten
    type: group
    items:
      - name: contact-settings
        label: Kontakt & Anschrift
        type: file
        path: src/content/settings/contact.yml
        format: yaml
        operations:
          create: false
          delete: false
        fields:
          - name: email
            label: E-Mail Schulbüro
            type: string
            required: true
          - name: kindergartenEmail
            label: E-Mail Kindergarten
            type: string
            required: true
          - name: phone
            label: Telefonnummer Schulbüro
            type: string
            required: true
            description: So eingeben, wie die Nummer sichtbar sein soll. Den Telefonlink erzeugt die Website automatisch.
          - name: kindergartenPhone
            label: Telefonnummer Kindergarten
            type: string
            required: true
            description: So eingeben, wie die Nummer sichtbar sein soll. Den Telefonlink erzeugt die Website automatisch.
          - name: address
            label: Anschrift
            type: object
            required: true
            fields:
              - name: street
                label: Straße und Hausnummer
                type: string
                required: true
              - name: postalCode
                label: Postleitzahl
                type: string
                required: true
                pattern: "^\\d{5}$"
              - name: locality
                label: Ort
                type: string
                required: true
              - name: district
                label: Ortsteil
                type: string
                description: Optional, zum Beispiel „Kalzhofen“.

      - name: opening-hours-settings
        label: Öffnungszeiten
        type: file
        path: src/content/settings/opening-hours.yml
        format: yaml
        operations:
          create: false
          delete: false
        fields:
          - name: school
            label: Schulzeiten
            type: object
            required: true
            fields:
              - name: primaria
                label: Primaria
                type: text
                required: true
                description: Reguläre Unterrichtszeit und mögliche Abweichung.
              - name: secundariaAndTertia
                label: Sekundaria und Tertia
                type: text
                required: true
                description: Reguläre Unterrichtszeit und verpflichtender Nachmittag.
          - name: schoolOffice
            label: Schulbüro
            type: string
            required: true
            list:
              min: 1
          - name: kindergarten
            label: Kindergarten
            type: object
            required: true
            list:
              min: 1
              collapsible:
                collapsed: true
                summary: "{days}"
            fields:
              - name: days
                label: Wochentage
                type: string
                required: true
              - name: hours
                label: Reguläre Öffnungszeit
                type: string
                required: true
              - name: details
                label: Verlängerte Betreuung
                type: string
                list: true
          - name: ganztag
            label: Ganztag
            type: string
            required: true
            description: Wird im Satz „Die offene Ganztagsschule bietet … einen verlässlichen Nachmittagsrahmen“ eingesetzt.
          - name: kindergartenClosures
            label: Schließzeiten Kindergarten
            type: object
            required: true
            fields:
              - name: schoolYear
                label: Kindergartenjahr
                type: string
                required: true
              - name: intro
                label: Einleitung
                type: text
                required: true
              - name: periods
                label: Schließzeiten
                type: object
                required: true
                list:
                  min: 1
                  collapsible:
                    collapsed: true
                    summary: "{label}"
                fields:
                  - name: label
                    label: Ferien
                    type: string
                    required: true
                  - name: dates
                    label: Zeitraum
                    type: string
                    required: true
              - name: holidayNote
                label: Hinweis zu Feiertagen
                type: text
                required: true

      - name: meal-settings
        label: Mittagessen
        type: file
        path: src/content/settings/meals.yml
        format: yaml
        operations:
          create: false
          delete: false
        fields:
          - name: provider
            label: Anbieter
            type: string
            required: true
          - name: schedule
            label: Liefertage
            type: string
            required: true
          - name: price
            label: Richtpreis
            type: string
            required: true
          - name: note
            label: Hinweis
            type: text
            required: true

      - name: school-fee-settings
        label: Schulgeld
        type: file
        path: src/content/settings/school-fees.yml
        format: yaml
        operations:
          create: false
          delete: false
        fields:
          - name: validFrom
            label: Stand der gesamten Kostenübersicht
            type: string
            required: true
            description: Zum Beispiel „Juli 2026“.
          - name: notice
            label: Verbindlichkeitshinweis
            type: text
            required: true
          - name: intro
            label: Einleitung zum Schulgeld
            type: text
            required: true
          - name: rows
            label: Schulgeld
            type: object
            required: true
            list:
              min: 1
              collapsible:
                collapsed: true
                summary: "{label}: {amount}"
            fields:
              - name: label
                label: Bezeichnung
                type: string
                required: true
              - name: amount
                label: Betrag
                type: string
                required: true

      - name: kindergarten-fee-settings
        label: Kindergartenbeiträge
        type: file
        path: src/content/settings/kindergarten-fees.yml
        format: yaml
        operations:
          create: false
          delete: false
        fields:
          - name: intro
            label: Einleitung
            type: text
            required: true
          - name: rows
            label: Beiträge nach Buchungszeit
            type: object
            required: true
            list:
              min: 1
              collapsible:
                collapsed: true
                summary: "{label}: {amount}"
            fields:
              - name: label
                label: Buchungszeit
                type: string
                required: true
              - name: amount
                label: Grundbeitrag
                type: string
                required: true
              - name: effectiveAmount
                label: Effektiver Beitrag mit Zuschuss
                type: string
                required: true
          - name: subsidyAmount
            label: Monatlicher Beitragszuschuss
            type: string
            required: true
          - name: subsidyNote
            label: Hinweis zum Beitragszuschuss
            type: text
            required: true

      - name: community-contribution-settings
        label: Einlage, Elternarbeit & Verein
        type: file
        path: src/content/settings/community-contributions.yml
        format: yaml
        operations:
          create: false
          delete: false
        fields:
          - name: deposit
            label: Elterneinlage
            type: object
            required: true
            fields:
              - name: intro
                label: Einleitung
                type: text
                required: true
              - name: description
                label: Rückzahlungshinweis
                type: text
                required: true
              - name: rows
                label: Beträge
                type: object
                required: true
                list:
                  min: 1
                  collapsible:
                    collapsed: true
                    summary: "{label}: {amount}"
                fields:
                  - name: label
                    label: Bezeichnung
                    type: string
                    required: true
                  - name: amount
                    label: Betrag
                    type: string
                    required: true
          - name: parentWork
            label: Elternarbeit
            type: object
            required: true
            fields:
              - name: intro
                label: Einleitung
                type: text
                required: true
              - name: school
                label: Schule
                type: object
                required: true
                fields:
                  - name: label
                    label: Überschrift
                    type: string
                    required: true
                  - name: amount
                    label: Stunden
                    type: string
                    required: true
                  - name: detail
                    label: Erläuterung
                    type: text
                    required: true
              - name: kindergarten
                label: Kindergarten
                type: object
                required: true
                fields:
                  - name: label
                    label: Überschrift
                    type: string
                    required: true
                  - name: amount
                    label: Stunden
                    type: string
                    required: true
                  - name: detail
                    label: Erläuterung
                    type: text
                    required: true
              - name: missedHours
                label: Nicht geleistete Zeit
                type: object
                required: true
                fields:
                  - name: label
                    label: Überschrift
                    type: string
                    required: true
                  - name: amount
                    label: Betrag
                    type: string
                    required: true
                  - name: detail
                    label: Erläuterung
                    type: text
                    required: true
          - name: membership
            label: Vereinsmitgliedschaft
            type: object
            required: true
            fields:
              - name: intro
                label: Einleitung
                type: text
                required: true
              - name: rows
                label: Beiträge
                type: string
                required: true
                list:
                  min: 1

settings:
  content:
    merge: true
  commit:
    identity: user
    templates:
      create: "content: add {name}"
      update: "content: update {name}"
      delete: "content: remove {name}"
      rename: "content: rename {oldFilename} to {newFilename}"
