seo:
  title: Spenden & unterstützen
  description: Unterstützt die gemeinnützige Montessori Allgäu mit einer Spende für vorbereitete Lernumgebungen, pädagogische Qualität und eine stabile Entwicklung.
homepage:
  eyebrow: Monte unterstützen
  title: Kinder brauchen Menschen, die Wege öffnen.
  text: Spenden helfen uns, Lernumgebungen, Materialien und pädagogische Qualität über den laufenden Rahmen hinaus weiterzuentwickeln.
  label: Spenden & unterstützen
hero:
  eyebrow: Spenden & unterstützen
  title: Gemeinsam Kindern Möglichkeiten eröffnen.
  intro: Als gemeinnützige, freie Einrichtung investieren wir in Menschen, Materialien und Räume, die Kinder wirklich unterstützen. Spenden machen Entwicklungen möglich, die aus laufenden Mitteln allein nicht zu tragen wären.
impact:
  eyebrow: Was eure Hilfe möglich macht
  title: Qualität vor Wachstum.
  imageAlt: Kinder arbeiten gemeinsam mit Montessori-Mathematikmaterialien
  paragraphs:
    - Wir wollen nicht groß werden um des Wachstums willen. Wir wollen pädagogisch besser, räumlich verlässlicher und als Gemeinschaft stabiler werden.
    - Spenden ermöglichen Verbesserungen, die der laufende Haushalt allein nicht tragen kann. Sie fließen in vorbereitete Lernumgebungen, pädagogische Qualität und konkrete Entwicklungsprojekte.
projects:
  eyebrow: Aktuelle Förderschwerpunkte
  title: Hier kann Unterstützung konkret wirken.
  intro: Diese Schwerpunkte werden von der Monte laufend aktualisiert. Für zweckgebundene oder größere Spenden klären wir gemeinsam, wo die Unterstützung sinnvoll eingesetzt werden kann.
  items:
    - title: Montessori-Materialien
      description: Materialien ergänzen und erneuern, damit Kinder selbstständig, konzentriert und auf ihrem jeweiligen Niveau arbeiten können.
    - title: Lernräume
      description: Innen- und Außenräume so weiterentwickeln, dass sie Orientierung, Bewegung, Begegnung und vertieftes Lernen ermöglichen.
    - title: Pädagogische Qualität
      description: Fortbildungen und Qualifizierung unterstützen, damit Montessori im Alltag warm, klar und fachlich anspruchsvoll gelebt wird.
directDonation:
  eyebrow: Direkt spenden
  title: Jeder Beitrag zählt.
  intro: Mit einer Überweisung unterstützt ihr die gemeinnützige Arbeit des Monte e.V. unmittelbar.
