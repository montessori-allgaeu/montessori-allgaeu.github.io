company:
  eyebrow: Firmen & Förderpartner
  title: Als Unternehmen gezielt etwas bewegen.
  text: Unternehmen, Stiftungen und größere Förderpersonen können einzelne Vorhaben oder die langfristige Entwicklung der Monte unterstützen.
  detail: Sprecht uns für Projektspenden sowie passende Sach- oder Leistungsspenden persönlich an. Gemeinsam klären wir Bedarf, Einsatz und eine verlässliche Abwicklung.
  buttonLabel: Unterstützung besprechen
  emailSubject: Unterstützung durch Unternehmen
receipt:
  eyebrow: Spendenbescheinigung
  title: Gemeinnützig unterstützen.
  intro: Der Monte e.V. ist gemeinnützig. Für eine Zuwendungsbestätigung benötigen wir euren Namen und eure Anschrift.
  instruction: Schickt uns die Angaben zusammen mit Betrag und Überweisungsdatum. Wir melden uns, falls noch etwas fehlt.
  buttonLabel: Angaben per E-Mail senden
  emailSubject: Spendenbescheinigung
otherSupport:
  eyebrow: Auch ohne Überweisung
  title: Lieber Zeit, Wissen oder Verantwortung geben?
  text: Auch Mitgliedschaft und passende fachliche oder praktische Unterstützung tragen die Monte. Sprecht uns an, wenn ihr euch auf andere Weise einbringen möchtet.
  primaryLabel: Mitglied werden
  secondaryLabel: Kontakt aufnehmen
