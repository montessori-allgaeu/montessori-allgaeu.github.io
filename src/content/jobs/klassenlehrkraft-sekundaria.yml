title: Klassenlehrer:in (m/w/d) für die Sekundaria
area: Schule
team: Klasse 5–7
scope: Mindestens 80 %
start: 01.09.2026
intro: Wir sind die Montessori-Schule & Kindergarten Allgäu – ein Ort, an dem Lernen, Gemeinschaft und Freiheit Hand in Hand gehen. Rund 150 Kinder im Alter von 3 bis 16 Jahren sowie über 30 Lehrkräfte und Mitarbeitende gestalten gemeinsam unseren Alltag.
about:
  - Unser Konzept nach Maria Montessori stellt individuelles Lernen, Persönlichkeitsentwicklung und eigenständiges Entdecken in den Mittelpunkt. Kinder sollen in einem Umfeld lernen, das ihre Neugier fördert und Raum zur Entfaltung bietet.
  - "Durch die private Vereinsträgerschaft arbeiten Eltern, Schüler:innen und Pädagog:innen eng zusammen, um eine lebendige Lernumgebung zu schaffen. Für dich bedeutet das: mehr Freiheit, wirklich etwas zu bewegen – für die Kinder und die Gemeinschaft."
responsibilities:
  - Klassenleitung für unsere jahrgangsgemischte Sekundaria (Klasse 5–7)
  - Gestaltung eines inspirierenden und individuellen Lernumfelds nach Montessori-Prinzipien
profile:
  - Abgeschlossenes Lehramtsstudium oder vergleichbare Qualifikation
  - Idealerweise erste Berufserfahrung als Lehrkraft
  - Begeisterung für die Montessori-Pädagogik und deren Werte
  - Du siehst Schülerinnen und Schüler als gleichberechtigte Menschen
  - Du liebst es, Kinder zu inspirieren und für das Lernen zu begeistern
benefits:
  - Unterstützung im Unterricht durch eine pädagogische Zweitkraft
  - Die Möglichkeit, Kinder ohne Noten- und Hausaufgabendruck im Schulalltag zu begleiten
  - Ein wertschätzendes und kollegiales Arbeitsumfeld
  - Aktive Mitgestaltung der Schulentwicklung
  - Bezahlte Fortbildungen in der Montessori-Pädagogik
closingTitle: Bereit, dich zu bewerben?
closingText: Wir freuen uns, dich kennenzulernen! Bewirb dich jetzt per Mail oder melde dich bei weiteren Fragen. Gemeinsam gestalten wir eine Zukunft, in der Kinder ihre Potenziale entfalten können – ganz nach dem Motto „Hilf mir, es selbst zu tun.“
status: published
position: 10
