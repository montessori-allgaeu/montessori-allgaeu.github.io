title: Fachlehrkraft Musik
area: Schule
scope: Teilzeit
intro: Du eröffnest Kindern und Jugendlichen einen lebendigen Zugang zu Musik und bringst deine fachliche Handschrift in unsere vorbereitete Umgebung ein.
responsibilities:
