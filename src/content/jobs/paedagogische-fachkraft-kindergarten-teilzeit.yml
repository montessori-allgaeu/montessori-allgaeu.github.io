title: Pädagogische Fachkraft / Erzieher:in (m/w/d) in Teilzeit
area: Kindergarten
team: Montessori-Kindergarten mit Naturpädagogik
scope: Teilzeit
start: Ab sofort
intro: Arbeiten, wo Kinder wirklich gesehen werden.
about:
  - Die Montessori-Schule & Kindergarten Allgäu ist ein Ort, an dem Kinder in ihrer Individualität ernst genommen und achtsam begleitet werden. In unserem eingruppigen Kindergarten verbinden wir Montessori-Pädagogik, Naturpädagogik und eine wertschätzende Beziehungskultur zu einem Alltag, der Kindern Raum für Selbstständigkeit, Entwicklung und echtes Entdecken gibt.
  - "Wir arbeiten in freier Trägerschaft und gestalten unsere Einrichtung gemeinschaftlich, engagiert und mit viel Überzeugung. Für dich bedeutet das: kurze Wege, echte Mitgestaltung und ein pädagogisches Umfeld mit klarem Profil."
responsibilities:
  - Begleitung der Kinder in ihrer individuellen Entwicklung
  - Gestaltung einer vorbereiteten Umgebung nach Montessori
  - Naturpädagogische Impulse und Projekte sowie feste Waldtage
  - Beobachtung, Reflexion und Zusammenarbeit im Team und mit Eltern
profile:
  - Staatliche Anerkennung als Erzieher:in, Kindheitspädagog:in oder vergleichbare pädagogische Qualifikation
  - Kind- und ressourcenorientierte Haltung
  - Begeisterung für Montessori- und Naturpädagogik
  - Freude an gemeinsamer Gestaltung und Arbeit auf Augenhöhe
benefits:
  - Vergütung orientiert am TVöD
  - 30 Urlaubstage und zwei Regenerationstage pro Jahr
  - Feste Arbeits-, Team- und Vorbereitungszeiten
  - Bezahlte Fortbildungen und Finanzierung des Montessori-Diploms
  - Ein kleines, engagiertes Team aus zwei Erzieherinnen, einer PiA-Auszubildenden und viel Raum für Mitgestaltung
closingTitle: Wir freuen uns auf dich
closingText: Du möchtest Kinder in einem kleinen, profilierten Kindergarten begleiten und pädagogisch wirklich etwas bewegen? Dann freuen wir uns darauf, dich kennenzulernen.
status: published
position: 40
