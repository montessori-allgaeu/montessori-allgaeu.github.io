intro: Nach dem gemeinsamen Mittagessen bleibt Zeit für freies Spiel. Zusätzlich wählen die Kinder aus den aktuellen Nachmittagsangeboten. Die Wahl gilt für das ganze Schuljahr – so entstehen feste Gruppen und ein verlässlicher Rhythmus.
secundariaNote: Der verpflichtende Nachmittag in Sekundaria und Tertia gehört zum regulären Schulalltag. Die offene Ganztagsschule bietet darüber hinaus einen buchbaren Nachmittagsrahmen.
