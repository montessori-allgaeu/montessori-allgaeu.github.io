costs:
  validFrom: Juli 2026
  notice: Diese Übersicht dient der Orientierung. Verbindlich sind immer der aktuelle Betreuungs-, Schul- und Vereinsvertrag. Bitte lasst euch die Beträge vor Vertragsabschluss bestätigen.
  schoolFees:
    intro: Das Schulgeld wird in zwölf Monatsraten pro Schuljahr erhoben.
    rows:
      - label: 1. Kind
        amount: 270 €
      - label: 2. Kind
        amount: 220 €
      - label: 3. Kind
        amount: 150 €
      - label: Jedes weitere Kind
        amount: 115 €
  kindergartenFees:
    intro: Der Beitrag richtet sich nach der täglich gebuchten Betreuungszeit.
    rows:
      - label: 4 bis unter 5 Stunden
        amount: 190 €
        effectiveAmount: 90 €
      - label: 5 bis unter 6 Stunden
        amount: 202,50 €
        effectiveAmount: 102,50 €
      - label: 6 bis unter 7 Stunden
        amount: 215 €
        effectiveAmount: 115 €
      - label: 7 bis unter 8 Stunden
        amount: 227,50 €
        effectiveAmount: 127,50 €
      - label: 8 bis unter 9 Stunden
        amount: 240 €
        effectiveAmount: 140 €
    subsidyAmount: 100 €
    subsidyNote: "Stand Juli 2026: Für zuschussberechtigte Kinder reduziert der bayerische Beitragszuschuss den Elternbeitrag automatisch um 100 € pro Monat. Ein Antrag der Eltern ist nicht erforderlich. Der Zuschuss gilt ab 1. September des Jahres, in dem das Kind drei Jahre alt wird, bis zur Einschulung."
  deposit:
    intro: Die zinslose Einlage stärkt Liquidität und Ausstattung.
    description: Sie wird nach dem Ausscheiden nach den vertraglichen Regeln zurückgezahlt.
    rows:
      - label: 1. Kind
        amount: 2.500 €
      - label: 2. Kind
        amount: 1.500 €
      - label: 3. Kind
        amount: 1.000 €
  parentWork:
    intro: Elternarbeit hält Beiträge bezahlbarer – und macht aus einer Einrichtung eine echte Gemeinschaft.
    school:
      label: Schule
      amount: 50 Stunden
      detail: pro Familie und Schuljahr; für Alleinerziehende 25 Stunden.
    kindergarten:
      label: Kindergarten
      amount: 25 Stunden
      detail: pro Familie und Kindergartenjahr; für Alleinerziehende 12,5 Stunden.
    missedHours:
      label: Nicht geleistete Zeit
      amount: 25 € / Stunde
      detail: werden nach den jeweils gültigen Vertragsregeln in Rechnung gestellt.
  membership:
    intro: Eltern werden Mitglied im gemeinnützigen Trägerverein und tragen die Monte damit auch demokratisch.
    rows:
      - "Familienmitgliedschaft: 50 € pro Jahr"
      - "Einzelmitgliedschaft: 40 € pro Jahr"
      - "Alleinerziehende: 30 € pro Jahr"
    additionalNote: Mittagessen, Ausflüge, Reisen oder besondere Materialien können zusätzlich berechnet werden.
